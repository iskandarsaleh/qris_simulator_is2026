services:
  redis:
    image: redis:7-alpine
    container_name: qris-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qris-simulator
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    depends_on:
      - redis
    restart: unless-stopped

  # ADD THIS ENTIRE FRONTEND BLOCK
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: qris-frontend
    ports:
      - "8080:80"   # Maps localhost:8080 to the container's port 80
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  redis-data: